name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install dependencies
        run: npm install
      - name: Link EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas init --non-interactive --force
      - name: Configure updates (OTA)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update:configure --non-interactive || true
      - name: EAS build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --non-interactive --wait --json > build.json
          cat build.json
          URL=$(node -e "const b=require('./build.json');const x=Array.isArray(b)?b[0]:b;console.log((x.artifacts&&(x.artifacts.applicationArchiveUrl||x.artifacts.buildUrl))||'')")
          echo "APK_URL=$URL"
          curl -L -o TheFrenchmansGrades.apk "$URL"
          ls -la TheFrenchmansGrades.apk
      - name: Publish OTA baseline
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch preview --message "v1.1.1 OTA baseline" --non-interactive || true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.1
          name: The Frenchman's Grades v1.1.1 (OTA)
          files: TheFrenchmansGrades.apk
